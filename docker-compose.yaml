services:
  omft:
    image: ghcr.io/avier99/omft:latest
    container_name: omft
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - omft-data:/app/data
      - omft-backups:/app/backups
    environment:
      - TZ=UTC
      - SERVER_ADDRESS=:8080
      - DATA_DIR=/app/data
      - BACKUP_DIR=/app/backups
      - BASE_URL=http://localhost:8080
      - JWT_SECRET=change_this_to_a_secure_random_string
      - TOTP_ENCRYPTION_KEY=change_this_to_a_32_byte_key_here
      - SKIP_SSL_VERIFY=false
      # Email (optional — remove if not using)
      - EMAIL_ENABLED=false
      - EMAIL_HOST=smtp.example.com
      - EMAIL_PORT=587
      - EMAIL_USERNAME=your_smtp_username
      - EMAIL_PASSWORD=your_smtp_password
      - EMAIL_FROM_EMAIL=omft@example.com
      - EMAIL_FROM_NAME=oMFT
      - EMAIL_ENABLE_TLS=true
      - EMAIL_REQUIRE_AUTH=true

volumes:
  omft-data:
  omft-backups:
