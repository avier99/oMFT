name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      
      - name: Download dependencies
        run: go mod download
      
      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest
      
      - name: Generate templ files
        run: templ generate
      
      - name: Run go vet
        run: go vet ./...
      
      - name: Run tests
        run: go test ./...
